<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Credicel POS V15.1 - Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .product-card:active { transform: scale(0.95); background-color: #eff6ff; }
        .blue-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .sidebar { transition: 0.3s; width: 350px; position: fixed; inset: 0 auto 0 0; z-index: 300; background: white; border-right: 5px solid #1e3a8a; }
        .sidebar.closed { transform: translateX(-100%); }
        #loading { display: none; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex flex-col font-sans">

    <div id="loading" class="fixed inset-0 bg-black/60 z-[500] flex items-center justify-center text-white font-black italic uppercase text-center">
        <div>PROCESANDO EN MATRIZ...<br><span class="text-[10px] font-normal tracking-widest">No cierres la ventana</span></div>
    </div>

    <header class="blue-gradient p-2 text-white flex justify-between items-center shadow-lg">
        <div class="flex gap-1">
            <button onclick="toggleSidebar()" class="bg-yellow-400 text-blue-900 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">CORTE</button>
            <div id="admin-tools" class="hidden flex gap-1">
                <button onclick="ajusteInv('ENTRADA')" class="bg-blue-500 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Entrada</button>
                <button onclick="ajusteInv('SALIDA')" class="bg-red-500 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Ajuste/Merma</button>
                <button onclick="ajusteInv('TRASPASO')" class="bg-blue-500 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Traspaso</button>
                <button onclick="modalEquipo()" class="bg-indigo-600 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Equipo</button>
            </div>
        </div>
        <div class="text-right uppercase font-black italic leading-none">
            <div id="v-nom" class="text-[10px]"></div>
            <div id="v-suc" class="text-yellow-400 text-[8px]"></div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <main class="flex-1 p-2 overflow-y-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2" id="grid"></main>
        
        <aside class="w-80 bg-white border-l p-4 flex flex-col shadow-xl">
            <div class="text-center mb-4 border-b pb-4">
                <span class="text-[10px] uppercase font-bold text-slate-400">Total Venta:</span><br>
                <span class="text-3xl font-black text-blue-600">$<span id="t-v">0.00</span></span>
                <button onclick="abrirCobro()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-xl mt-2 shadow-lg active:scale-95 transition">COBRAR</button>
                <button onclick="limpiarVenta()" class="mt-2 text-[9px] text-slate-400 uppercase font-bold underline">Limpiar Carrito</button>
            </div>
            <div id="carrito" class="flex-1 overflow-y-auto space-y-1"></div>
        </aside>
    </div>

    <div id="modal-cobro" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center p-4 z-[200]">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-6 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-4 text-blue-900 uppercase italic">Finalizar Venta</h2>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="quickPay(100)" class="bg-slate-100 py-4 rounded-xl font-black text-slate-500 hover:bg-blue-50">$100</button>
                <button onclick="quickPay(200)" class="bg-slate-100 py-4 rounded-xl font-black text-slate-500 hover:bg-blue-50">$200</button>
                <button onclick="quickPay(500)" class="bg-slate-100 py-4 rounded-xl font-black text-slate-500 hover:bg-blue-50">$500</button>
            </div>
            <input type="number" id="pago-cliente" oninput="calcCambio()" class="w-full p-4 border-2 rounded-xl text-center text-4xl font-black mb-4 outline-none focus:border-blue-500" placeholder="0.00">
            <div class="p-4 bg-yellow-400 rounded-xl mb-4 text-blue-900 font-black">
                <p class="text-[10px] uppercase opacity-70">Cambio:</p>
                <p class="text-4xl tracking-tighter">$ <span id="cambio-v">0.00</span></p>
            </div>
            <button onclick="finalizarVenta()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase shadow-lg active:scale-95 transition">Registrar Venta</button>
            <button onclick="cerrarCobro()" class="mt-4 text-slate-400 uppercase text-[10px] font-bold underline block mx-auto font-black">Volver</button>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-white z-[400] flex items-center justify-center p-4">
        <div class="max-w-sm w-full border-4 border-blue-900 p-8 rounded-[2rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-blue-900 italic mb-6">CREDI<span class="text-yellow-400">CEL</span></h1>
            <label class="block text-[10px] text-left font-black uppercase text-slate-400 ml-1">Vendedor</label>
            <select id="sel-u" class="w-full p-4 border-2 rounded-xl mb-4 font-bold text-blue-900 bg-slate-50 outline-none"></select>
            <label class="block text-[10px] text-left font-black uppercase text-slate-400 ml-1">Sucursal</label>
            <select id="sel-s" class="w-full p-4 border-2 rounded-xl mb-4 font-bold text-blue-900 bg-slate-50 outline-none">
                <option>Navojoa</option><option>Huatabampo</option><option>Bodega</option>
            </select>
            <label class="block text-[10px] text-left font-black uppercase text-slate-400 ml-1">Pin de acceso</label>
            <input id="pin" type="password" maxlength="6" class="w-full p-4 border-2 rounded-xl text-center text-2xl tracking-[10px] mb-4 outline-none" placeholder="****">
            <button onclick="login()" class="w-full blue-gradient text-white py-5 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition">Entrar al Sistema</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar closed p-6 flex flex-col shadow-2xl border-r-[10px] border-blue-900">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-black text-blue-900 uppercase italic">Resumen del Turno</h2>
            <button onclick="toggleSidebar()" class="text-4xl font-bold">&times;</button>
        </div>
        <div id="corte-lista" class="flex-1 overflow-y-auto text-[10px] font-bold text-slate-500 space-y-2"></div>
        <div class="p-4 bg-blue-900 rounded-2xl my-4 text-center">
            <p class="text-[10px] uppercase text-white opacity-60 font-black">Efectivo en Caja:</p>
            <div id="total-corte" class="text-yellow-400 text-3xl font-black">$0.00</div>
        </div>
        <button onclick="enviarCorte()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg active:scale-95 transition">Cerrar Turno y Salir</button>
    </div>

    <script>
        // URL NUEVA ACTUALIZADA
        const URL = "https://script.google.com/macros/s/AKfycbzZNHJ4dEx8--WuFGVZHaQi0DN-4tZD46C-URnmatlQDF1ifGD0eVUmhMEhegyaBjgwFA/exec";
        
        let USERS = [], PRODS = [], carrito = [], vNom = "", vSuc = "", corte = {};

        window.onload = async () => {
            try {
                const res = await fetch(URL + "?action=getUsers");
                USERS = await res.json();
                document.getElementById('sel-u').innerHTML = USERS.map(u => `<option>${u.nombre}</option>`).join('');
                
                // AUTO-RELLENADO POR MEMORIA LOCAL
                const memoU = localStorage.getItem('lastU');
                const memoS = localStorage.getItem('lastS');
                if(memoU) document.getElementById('sel-u').value = memoU;
                if(memoS) document.getElementById('sel-s').value = memoS;

                // RECUPERAR RESPALDO SI EXISTE
                const backup = localStorage.getItem('backup_venta');
                if(backup) {
                    if(confirm("Se detectó una venta que no se terminó de guardar. ¿Deseas recuperarla?")) {
                        carrito = JSON.parse(backup);
                        actualizar();
                    } else { localStorage.removeItem('backup_venta'); }
                }
            } catch (e) { alert("Error al conectar con Matriz."); }
        };

        async function login() {
            const u = USERS.find(x => x.nombre == document.getElementById('sel-u').value);
            if(u && u.pin == document.getElementById('pin').value) {
                vNom = u.nombre; vSuc = document.getElementById('sel-s').value;
                localStorage.setItem('lastU', vNom);
                localStorage.setItem('lastS', vSuc);

                if(vNom.toLowerCase() == "said") document.getElementById('admin-tools').classList.remove('hidden');
                
                document.getElementById('modal-login').style.display = 'none';
                document.getElementById('v-nom').innerText = vNom;
                document.getElementById('v-suc').innerText = vSuc;
                
                document.getElementById('loading').style.display = 'flex';
                const res = await fetch(URL + "?action=getProducts");
                PRODS = await res.json();
                PRODS.push({id:'REP', n:'REPARACIÓN/VAR', p:0}, {id:'GAS', n:'GASTO INTERNO', p:0});
                pintar();
                document.getElementById('loading').style.display = 'none';
            } else { alert("PIN Incorrecto"); }
        }

        function pintar() {
            document.getElementById('grid').innerHTML = PRODS.map(p => `
                <div onclick="clickProd('${p.id}', '${p.n}', ${p.p})" class="product-card bg-white p-2 rounded-xl shadow-sm text-center flex flex-col h-24 justify-between border">
                    <div class="text-blue-600 font-black text-[10px] uppercase">${p.id}</div>
                    <div class="text-[7px] font-bold text-slate-400 uppercase leading-none overflow-hidden h-4">${p.n}</div>
                    <div class="text-blue-900 font-black text-[10px]">${p.id === 'GAS' || p.id === 'REP' ? 'VAR' : '$'+p.p}</div>
                </div>`).join('');
        }

        function clickProd(id, n, p) {
            if(id === 'GAS') {
                const con = prompt("CONCEPTO DEL GASTO:"); 
                const mon = prompt("MONTO:");
                if(con && mon > 0) enviarManual({ tipo: "GASTO", vendedor: vNom, sucursal: vSuc, concepto: con, monto: parseFloat(mon) });
            } else if(id === 'REP') {
                const m = prompt("COSTO DE REPARACIÓN:"); 
                if(m > 0) add(id, n, parseFloat(m));
            } else { add(id, n, p); }
        }

        function add(id, n, p) {
            carrito.push({id, n, p});
            actualizar();
        }

        function actualizar() {
            document.getElementById('carrito').innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg text-[9px] border-l-4 border-blue-600 mb-1">
                    <div class="font-bold truncate w-40 uppercase">${item.n}</div>
                    <button onclick="del(${i})" class="text-red-500 text-lg font-black">&times;</button>
                </div>`).join('');
            document.getElementById('t-v').innerText = carrito.reduce((a, b) => a + b.p, 0).toFixed(2);
        }

        function del(i) { carrito.splice(i, 1); actualizar(); }
        function limpiarVenta() { carrito = []; actualizar(); }
        function abrirCobro() { if(carrito.length > 0) document.getElementById('modal-cobro').style.display = 'flex'; }
        function cerrarCobro() { document.getElementById('modal-cobro').style.display = 'none'; }
        function quickPay(n) { document.getElementById('pago-cliente').value = n; calcCambio(); }
        
        function calcCambio() {
            const total = parseFloat(document.getElementById('t-v').innerText);
            const pago = parseFloat(document.getElementById('pago-cliente').value) || 0;
            document.getElementById('cambio-v').innerText = (pago - total > 0) ? (pago - total).toFixed(2) : "0.00";
        }

        async function finalizarVenta() {
            localStorage.setItem('backup_venta', JSON.stringify(carrito));
            document.getElementById('loading').style.display = 'flex';

            const agrupado = {};
            carrito.forEach(x => {
                if(!agrupado[x.id]) agrupado[x.id] = {codigo: x.id, cantidad: 0, precio: 0};
                agrupado[x.id].cantidad++; agrupado[x.id].precio += x.p;
                if(!corte[x.id]) corte[x.id] = {cant: 0, total: 0};
                corte[x.id].cant++; corte[x.id].total += x.p;
            });

            try {
                await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: Object.values(agrupado)})});
                alert("✅ Venta Guardada en Matriz");
                localStorage.removeItem('backup_venta');
                carrito = []; actualizar(); cerrarCobro();
                document.getElementById('pago-cliente').value = "";
            } catch(e) { alert("⚠️ Error de conexión. El carrito sigue guardado."); }
            document.getElementById('loading').style.display = 'none';
        }

        async function enviarManual(data) {
            document.getElementById('loading').style.display = 'flex';
            try {
                await fetch(URL, {method: 'POST', body: JSON.stringify(data)});
                alert("✅ Registro Exitoso");
            } catch(e) { alert("Error al enviar"); }
            document.getElementById('loading').style.display = 'none';
        }

        async function ajusteInv(modo) {
            let d = { tipo: "AJUSTE_INV", modo: modo };
            if(modo == "TRASPASO") {
                d.origen = prompt("Sucursal Origen (Navojoa/Huatabampo/Bodega):");
                d.destino = prompt("Sucursal Destino (Navojoa/Huatabampo/Bodega):");
                if(!d.origen || !d.destino) return;
            } else {
                d.ubicacion = prompt("Sucursal del movimiento:");
                if(!d.ubicacion) return;
            }
            d.codigo = prompt("Código del producto:");
            d.cantidad = prompt("Cantidad:");
            if(!d.codigo || !d.cantidad) return;
            enviarManual(d);
        }

        async function modalEquipo() {
            const m = prompt("Modelo:"); const i = prompt("IMEI:"); const n = prompt("Número:");
            const c = prompt("Cliente:"); const e = prompt("Enganche:");
            if(m && i) enviarManual({tipo: "EQUIPO", modelo: m, imei: i, numero: n, nombre: c, enganche: e, sucursal: vSuc});
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            let h = ""; let t = 0;
            for(let id in corte) {
                h += `<div class="flex justify-between border-b py-2 italic font-black uppercase"><span>${corte[id].cant}x ${id}</span><span>$${corte[id].total.toFixed(2)}</span></div>`;
                t += corte[id].total;
            }
            document.getElementById('corte-lista').innerHTML = h || "<p class='text-center py-10 opacity-30'>Sin ventas registradas</p>";
            document.getElementById('total-corte').innerText = "$"+t.toFixed(2);
        }

        async function enviarCorte() {
            const t = document.getElementById('total-corte').innerText.replace("$", "");
            if(confirm("¿Deseas cerrar el turno? Se enviará el corte de caja.")) {
                await enviarManual({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: [], corteX: t});
                window.location.reload();
            }
        }
    </script>
</body>
</html>
